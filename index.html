<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager Sprint 2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <h2 class="text-center mb-4">Task Management App</h2>

    <form id="taskForm" class="border p-4 rounded shadow">

        <div class="mb-3">
            <label>Task Name</label>
            <input type="text" id="taskName" class="form-control">
        </div>

        <div class="mb-3">
            <label>Description</label>
            <textarea id="description" class="form-control"></textarea>
        </div>

        <div class="mb-3">
            <label>Assigned To</label>
            <input type="text" id="assignedTo" class="form-control">
        </div>

        <div class="mb-3">
            <label>Due Date</label>
            <input type="date" id="dueDate" class="form-control">
        </div>

        <div class="mb-3">
            <label>Status</label>
            <select id="status" class="form-select">
                <option value="">Select Status</option>
                <option>TODO</option>
                <option>IN PROGRESS</option>
                <option>REVIEW</option>
                <option>DONE</option>
            </select>
        </div>

        <button type="submit" class="btn btn-primary w-100">Add Task</button>
    </form>

    <h3 class="mt-5">Task List</h3>
    <div id="taskList"></div>
</div>

<script src="taskManager.js"></script>
<script src="app.js"></script>

</body>
</html>
